version: 2
project_name: obsidian-headless

# Configures the release process on GitHub
# https://goreleaser.com/customization/release/
release:
  github:
    owner: Belphemur
    name: obsidian-headless
  include_meta: true

# Configures the changelog generation
# https://goreleaser.com/customization/changelog/
changelog:
  sort: asc
  use: github
  format: "{{.SHA}}: {{.Message}} (@{{.AuthorUsername}})"
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Performance"
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2

# Hooks to run before the build process starts
# https://goreleaser.com/customization/hooks/
before:
  hooks:
    - go -C src mod tidy

# Configures the Go build process
# https://goreleaser.com/customization/build/
builds:
  - id: obsidian-headless
    dir: src
    binary: ob
    main: ./cmd/ob-go
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/Belphemur/obsidian-headless/src-go/internal/buildinfo.Version={{.Version}}
      - -X github.com/Belphemur/obsidian-headless/src-go/internal/buildinfo.Commit={{.Commit}}
      - -X github.com/Belphemur/obsidian-headless/src-go/internal/buildinfo.Date={{ .CommitDate }}
    env:
      - CGO_ENABLED=0

# Configures the binary archive generation
# https://goreleaser.com/customization/archive/
archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

# Configures the checksum file generation
# https://goreleaser.com/customization/checksum/
checksum:
  name_template: "checksums.txt"

# Creates a source code archive (tar.gz and zip)
# https://goreleaser.com/customization/source/
source:
  enabled: true

# Change the digests filename for attestation
# https://goreleaser.com/customization/docker_digest/
docker_digest:
  name_template: "digests.txt"

# Creates SBOMs (Software Bill of Materials)
# https://goreleaser.com/customization/sbom/
sboms:
  - id: archive
    artifacts: archive
  - id: source
    artifacts: source

# Creates Docker images and pushes them to registries using Docker v2 API
# https://goreleaser.com/customization/docker/
dockers_v2:
  - id: obsidian-headless-image
    ids:
      - obsidian-headless
    dockerfile: build/Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
    images:
      - "ghcr.io/belphemur/obsidian-headless"
    tags:
      - "{{ .Version }}"
      - latest
    extra_files:
      - build/rootfs
      - build/get-token.sh
      - build/README.md
    annotations:
      "org.opencontainers.image.description": "Obsidian headless client for syncing and publishing vaults without the desktop app."
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"
    labels:
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"
      "org.opencontainers.image.description": "Obsidian headless client for syncing and publishing vaults without the desktop app."

# START: New Publishing Sections

# NFPM - Linux native package generation (.deb, .rpm, .apk, .archlinux)
# https://goreleaser.com/customization/package/nfpm/
nfpms:
  - package_name: obsidian-headless
    maintainer: "Belphemur <obsidian-sync@admincmd.com>"
    description: |
      Obsidian headless client for syncing and publishing vaults
      without the desktop app.
    license: GPL-3.0
    vendor: Belphemur
    homepage: "https://github.com/Belphemur/obsidian-headless"
    section: utils
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/obsidian-headless/LICENSE
      - src: ./README.md
        dst: /usr/share/doc/obsidian-headless/README.md

# Homebrew Cask - pushes to Belphemur/homebrew-tap
# https://goreleaser.com/customization/publish/homebrew_casks/
homebrew_casks:
  - name: obsidian-headless
    repository:
      owner: Belphemur
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/Belphemur/obsidian-headless"
    description: |
      Obsidian headless client for syncing and publishing vaults
      without the desktop app.
    generate_completions_from_executable:
      shell_parameter_format: cobra
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/ob"]
          end
    skip_upload: auto
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

# AUR - Arch User Repository package
# https://goreleaser.com/customization/publish/aur/
aurs:
  - name: obsidian-headless-go-bin
    maintainers:
      - "Belphemur <obsidian-sync@admincmd.com>"
    license: GPL-3.0
    homepage: "https://github.com/Belphemur/obsidian-headless"
    description: Obsidian headless client for syncing and publishing vaults without the desktop app in go.
    private_key: "{{ .Env.AUR_SSH_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/obsidian-headless-go-bin.git"
    skip_upload: auto
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

# Winget - Windows Package Manager
# https://goreleaser.com/customization/publish/winget/
winget:
  - name: obsidian-headless
    publisher: Belphemur
    short_description: "Headless Obsidian sync and publish client"
    license: GPL-3.0
    package_identifier: Belphemur.ObsidianHeadless
    homepage: "https://github.com/Belphemur/obsidian-headless"
    description: |
      Obsidian headless client for syncing and publishing vaults
      without the desktop app.
    repository:
      owner: Belphemur
      name: winget-pkgs
      branch: "obsidian-headless-{{.Version}}"
      token: "{{ .Env.WINGET_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
    skip_upload: auto
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    tags:
      - obsidian
      - sync
      - publish
      - cli

# END: New Publishing Sections
