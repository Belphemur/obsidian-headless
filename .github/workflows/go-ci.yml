name: Go CI

on:
  pull_request:
    paths:
      - "src-go/**"
      - "mock-server/**"
      - ".github/workflows/go-ci.yml"
      - ".github/workflows/go-cd.yml"
  push:
    branches:
      - main
    paths:
      - "src-go/**"
      - "mock-server/**"
      - ".github/workflows/go-ci.yml"
      - ".github/workflows/go-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-go
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: src-go/go.mod
          cache-dependency-path: src-go/go.sum

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1.6
          working-directory: src-go

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-go
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: src-go/go.mod
          cache-dependency-path: src-go/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
        working-directory: .
      - run: go test ./...
