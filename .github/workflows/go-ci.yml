name: Go CI

on:
  pull_request:
    paths:
      - "src/**"
      - "website/**"
      - ".github/workflows/go-ci.yml"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "website/**"
      - ".github/workflows/go-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - uses: golangci/golangci-lint-action@v9
        with:
          working-directory: src

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - ./internal/sync/...
          - ./internal/sync/watch/...
          - ./internal/api/...
          - ./internal/storage/...
          - ./internal/config/...
          - ./internal/circuitbreaker/...
          - ./internal/util/...
          - ./internal/publish/...
          - ./internal/model/...
          - ./internal/encryption/...
          - ./internal/logging/...
          - ./internal/buildinfo/...
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - run: go test -race -count=1 -timeout=5m -shuffle=on ${{ matrix.package }}

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install dependencies
        working-directory: website
        run: npm ci --legacy-peer-deps

      - name: Build docs (dry run)
        working-directory: website
        run: npm run docs:build
