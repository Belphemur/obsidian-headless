name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.check_release.outputs.release_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if release was created
        id: check_release
        run: |
          if [ -f dist/checksums.txt ] && [ -f dist/digests.txt ]; then
            echo "release_created=true" >> "$GITHUB_OUTPUT"
            echo "Release was created, attestation will proceed"
          else
            echo "release_created=false" >> "$GITHUB_OUTPUT"
            echo "No release was created, skipping attestation"
          fi

      - name: Attest Build Provenance for Archives
        if: steps.check_release.outputs.release_created == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-checksums: dist/checksums.txt

      - name: Attest Build Provenance for Docker Images
        if: steps.check_release.outputs.release_created == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-checksums: dist/digests.txt
