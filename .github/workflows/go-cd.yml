name: Go CD

on:
  push:
    branches:
      - main
    paths:
      - "src-go/**"
      - "mock-server/**"
      - ".github/workflows/go-ci.yml"
      - ".github/workflows/go-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            extension: ""
          - goos: darwin
            goarch: amd64
            extension: ""
          - goos: windows
            goarch: amd64
            extension: ".exe"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: src-go/go.mod
          cache-dependency-path: src-go/go.sum

      - env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -o dist/ob-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.extension }} ./cmd/ob-go
        working-directory: src-go

      - uses: actions/upload-artifact@v4
        with:
          name: ob-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: src-go/dist/ob-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.extension }}
          if-no-files-found: error
