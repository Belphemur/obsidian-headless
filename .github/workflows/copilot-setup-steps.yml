name: Copilot Setup Steps

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    name: Setup Node and Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: src/go.mod
          cache: true
          cache-dependency-path: src/go.sum

      - name: Verify Go installation
        run: |
          go version
          go env

      - name: Download Go dependencies
        run: |
          cd src
          go mod download
          go mod verify

      - name: Set up Node LTS
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: legacy/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: legacy

      - name: Verify Node installation
        run: |
          node --version
          npm --version

      - name: Setup complete
        run: |
          echo "✅ Go 1.26 environment ready"
          echo "✅ Node LTS environment ready"
          echo "✅ Go and npm dependencies installed"
