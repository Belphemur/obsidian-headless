name: TypeScript CI

on:
  pull_request:
    paths:
      - "src/**"
      - "mock-server/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/typescript-ci.yml"
      - ".github/workflows/typescript-cd.yml"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "mock-server/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/typescript-ci.yml"
      - ".github/workflows/typescript-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run lint

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test
