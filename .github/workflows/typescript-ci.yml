name: TypeScript CI

on:
  pull_request:
    paths:
      - "legacy/src/**"
      - "legacy/mock-server/**"
      - "legacy/package.json"
      - "legacy/package-lock.json"
      - "legacy/tsconfig.json"
      - ".github/workflows/typescript-ci.yml"
  push:
    branches:
      - main
    paths:
      - "legacy/src/**"
      - "legacy/mock-server/**"
      - "legacy/package.json"
      - "legacy/package-lock.json"
      - "legacy/tsconfig.json"
      - ".github/workflows/typescript-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legacy
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: legacy/package-lock.json

      - run: npm ci
      - run: npm run lint

  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legacy
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: legacy/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test
