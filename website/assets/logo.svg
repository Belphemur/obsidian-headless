<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Obsidian Headless Logo">
  <title>Obsidian Headless</title>
  <desc>A faceted crystal icon with an integrated terminal prompt, representing the Obsidian Headless project.</desc>

  <!-- Main crystal shape with terminal prompt cutout -->
  <path fill-rule="evenodd" d="
    M 50,30
    L 150,30
    L 170,80
    L 100,190
    L 30,80
    Z

    M 70,88
    L 108,110
    L 70,132
    L 70,118
    L 88,110
    L 70,102
    Z

    M 114,106
    L 150,106
    L 150,122
    L 114,122
    Z
  " fill="#A88BFA"/>

  <!-- Internal facet lines -->
  <g stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.25">
    <path d="M 50,30 L 100,110"/>
    <path d="M 150,30 L 100,110"/>
    <path d="M 30,80 L 100,110"/>
    <path d="M 170,80 L 100,110"/>
    <path d="M 100,110 L 100,190"/>
  </g>
</svg>
