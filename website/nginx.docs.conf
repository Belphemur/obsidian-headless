server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # Serve VuePress docs under /obsidian-headless/ base path
    location /obsidian-headless/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /obsidian-headless/index.html;
    }

    # Redirect root to docs
    location = / {
        return 301 /obsidian-headless/;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
